<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Reader</title>
</head>
<body>
    <h1>Iframe Cookie Reader</h1>
    <p>Check the console for cookie access results.</p>
    <script>
        // Log the iframe's cookies to the console
        console.log('Iframe cookies: ' + document.cookie);
        // Log the iframe's origin to the console
        console.log('Iframe origin: ' + window.origin);
    </script>
</body>
</html>
